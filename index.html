<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>South Asian Neuroscience Network — Members</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2340;
  --blue: #2563eb;
  --purple: #6d28d9;
  --accent: #7c3aed;
  --light-blue: #dbeafe;
  --bg: #f8f9fc;
  --white: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.07);
  --card-shadow-hover: 0 8px 32px rgba(37,99,235,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--navy);
  color: white;
  padding: 0;
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 80% 50%, rgba(124,58,237,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(37,99,235,0.2) 0%, transparent 60%);
  pointer-events: none;
}
.header-inner {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 56px 32px 48px;
}
.header-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #93c5fd;
  margin-bottom: 18px;
}
.header-kicker::before {
  content: '';
  display: inline-block;
  width: 28px;
  height: 2px;
  background: #93c5fd;
  border-radius: 2px;
}
h1.site-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -.02em;
  color: white;
  margin-bottom: 16px;
}
h1.site-title em {
  font-style: normal;
  color: #a5b4fc;
}
.site-subtitle {
  font-size: 16px;
  color: #94a3b8;
  font-weight: 300;
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 36px;
}
.header-stats {
  display: flex;
  gap: 36px;
  flex-wrap: wrap;
}
.stat-item { text-align: left; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  color: white;
  line-height: 1;
}
.stat-desc {
  font-size: 12px;
  color: #64748b;
  margin-top: 4px;
  letter-spacing: .04em;
  text-transform: uppercase;
}

/* ── NAV / FILTER BAR ── */
.filter-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.filter-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-inner::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  padding: 16px 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--blue); }
.filter-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

.search-wrap {
  margin-left: auto;
  padding: 10px 0;
  flex-shrink: 0;
}
.search-input {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  outline: none;
  color: var(--text);
  background: var(--bg);
  width: 200px;
  transition: border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

/* ── MAIN ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 32px 80px;
}

.section-heading {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  margin: 40px 0 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-heading::after {
  content: attr(data-count);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  letter-spacing: .03em;
}
.section-heading:first-of-type { margin-top: 0; }

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.member-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  cursor: default;
  transition: box-shadow .25s, transform .25s, border-color .25s;
  animation: cardIn .4s ease both;
}
.member-card:hover {
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-4px);
  border-color: #bfdbfe;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.member-card.hidden { display: none; }

/* Avatar */
.avatar-wrap {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  margin-bottom: 14px;
  border: 3px solid var(--light-blue);
  flex-shrink: 0;
  position: relative;
  background: linear-gradient(135deg, #dbeafe 0%, #ede9fe 100%);
}
.avatar-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.avatar-initials {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -.02em;
}

.member-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 5px;
}
.member-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 6px;
  line-height: 1.4;
}
.member-inst {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  line-height: 1.5;
  margin-bottom: 14px;
  flex: 1;
}
.card-footer {
  width: 100%;
  display: flex;
  justify-content: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.email-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  color: var(--blue);
  text-decoration: none;
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--light-blue);
  transition: background .15s, color .15s;
}
.email-btn:hover { background: #bfdbfe; color: var(--navy); }
.email-btn svg { flex-shrink: 0; }
.no-email {
  font-size: 11px;
  color: var(--border);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 64px 32px;
  color: var(--muted);
  display: none;
}
.empty-state.show { display: block; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 600px) {
  .header-inner { padding: 40px 20px 36px; }
  .main { padding: 24px 16px 60px; }
  .filter-inner { padding: 0 16px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .avatar-wrap { width: 64px; height: 64px; }
  .avatar-initials { font-size: 18px; }
  .member-name { font-size: 13px; }
  .header-stats { gap: 24px; }
  .search-input { width: 140px; }
}
</style>
</head>

    <button class="filter-btn" data-filter="other" onclick="filterCards('other', this)">Professionals</button>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Search members…" oninput="searchCards(this.value)">
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="main" id="main-content">
  <div class="empty-state" id="empty-state">
    <h3>No members found</h3>
    <p>Try adjusting your search or filter.</p>
  </div>
</main>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function initials(name) {
  return name.trim().split(/\s+/).filter(w => /^[A-Za-z]/.test(w)).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

const sectionMeta = {
  professor: { label: "Professors & Faculty", order: 0 },
  postdoc:   { label: "Postdocs & Research Scientists", order: 1 },
  phd:       { label: "PhD & Doctoral Students", order: 2 },
  grad:      { label: "Graduate & Masters Students", order: 3 },
  undergrad:  { label: "Undergraduate Students", order: 4 },
  other:     { label: "Professionals & Others", order: 5 },
};

let currentFilter = 'all';
let currentSearch = '';

function renderAll() {
  const main = document.getElementById('main-content');
  // Clear sections
  main.querySelectorAll('.section-heading, .card-grid').forEach(el => el.remove());

  const stages = Object.keys(sectionMeta).sort((a,b) => sectionMeta[a].order - sectionMeta[b].order);
  let totalVisible = 0;

  stages.forEach(stage => {
    const filtered = members.filter(m => {
      const matchStage = currentFilter === 'all' || m.stage === currentFilter;
      const q = currentSearch.toLowerCase();
      const matchSearch = !q || m.name.toLowerCase().includes(q) || m.inst.toLowerCase().includes(q) || m.title.toLowerCase().includes(q);
      return m.stage === stage && matchStage && matchSearch;
    });
    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const heading = document.createElement('div');
    heading.className = 'section-heading';
    heading.setAttribute('data-count', filtered.length);
    heading.textContent = sectionMeta[stage].label;
    main.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    filtered.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'member-card';
      card.style.animationDelay = (i * 30) + 'ms';
      const ini = initials(m.name);
      const emailHtml = m.email
        ? `<a class="email-btn" href="mailto:${m.email}" title="${m.email}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Contact
           </a>`
        : `<span class="no-email">—</span>`;
      card.innerHTML = `
        <div class="avatar-wrap">
          <div class="avatar-initials">${ini}</div>
        </div>
        <div class="member-name">${m.name}</div>
        <div class="member-title">${m.title}</div>
        <div class="member-inst">${m.inst}</div>
        <div class="card-footer">${emailHtml}</div>`;
      grid.appendChild(card);
    });
    main.appendChild(grid);
  });

  const empty = document.getElementById('empty-state');
  empty.classList.toggle('show', totalVisible === 0);
}

function filterCards(stage, btn) {
  currentFilter = stage;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function searchCards(val) {
  currentSearch = val;
  renderAll();
}

// Stats
function computeStats() {
  const total = members.length;
  const insts = new Set(members.map(m => m.inst.split('/')[0].trim())).size;
  // rough country count from institution keywords
  const countryKeywords = {
    'UK|London|Edinburgh|Sussex|Reading|Leeds|Newcastle|Oxford|Cambridge|Warwick|Stirling|Manchester|Holloway': 'UK',
    'Canada|McGill|Western|Toronto|Brock|Guelph|Montreal|UWO': 'Canada',
    'Australia|Melbourne': 'Australia',
    'Germany|Augsburg|Magdeburg|Tuebingen': 'Germany',
    'India|IIT|IISER|AIIMS|BITS|NISER|Delhi': 'India',
    'France|Paris|Aix-Marseille|Marseille|Bordeaux|Rennes': 'France',
    'Austria': 'Austria',
    'Bangladesh|Brac': 'Bangladesh',
    'Ireland|Dublin': 'Ireland',
    'Netherlands|Amsterdam': 'Netherlands',
    'Singapore': 'Singapore',
    'Switzerland|Lausanne': 'Switzerland',
    'Taiwan|Taipei': 'Taiwan',
  };
  const countries = new Set(['USA']);
  members.forEach(m => {
    Object.keys(countryKeywords).forEach(kw => {
      if (new RegExp(kw,'i').test(m.inst)) countries.add(countryKeywords[kw]);
    });
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-inst').textContent = insts + '+';
  document.getElementById('stat-countries').textContent = countries.size + '+';
}

computeStats();
renderAll();
</script>
